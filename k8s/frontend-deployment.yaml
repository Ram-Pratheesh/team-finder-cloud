# ============================================================
# Frontend Deployment - React (Vite) served via Nginx
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teamfinder-frontend
  namespace: teamfinder
  labels:
    app: teamfinder
    component: frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teamfinder
      component: frontend
  template:
    metadata:
      labels:
        app: teamfinder
        component: frontend
        tier: web
    spec:
      containers:
        - name: frontend
          image: teamfinderacr.azurecr.io/teamfinder-frontend:latest
          ports:
            - containerPort: 80
              protocol: TCP
          
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      
      imagePullSecrets:
        - name: acr-secret
      
      restartPolicy: Always
