# ============================================================
# Frontend Service - Exposes the React app externally
# ============================================================
# LoadBalancer service: gets an external IP from Azure.
# Users access the application through this IP.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: teamfinder-frontend-svc
  namespace: teamfinder
  labels:
    app: teamfinder
    component: frontend
spec:
  type: LoadBalancer
  selector:
    app: teamfinder
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
